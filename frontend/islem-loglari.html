<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white p-8 font-sans text-slate-800">
    <div class="flex justify-between items-center mb-6">
        <div class="border-l-4 border-[#cc1923] pl-4">
            <h2 class="text-2xl font-black text-[#1e293b] uppercase tracking-tight">İşlem Logları</h2>
            <p class="text-xs font-bold text-slate-500 uppercase tracking-wider">Sistem İzleme ve Denetim Ekranı</p>
        </div>
        <button id="yenileBtn" onclick="logYukle(true)" class="bg-[#1e293b] text-white px-6 py-2 rounded-lg text-xs font-black shadow-md hover:bg-black transition uppercase tracking-widest">Yenile</button>
    </div>

    <section class="bg-slate-50 border border-slate-200 rounded-xl p-4 mb-4">
        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-6 gap-3 items-end">
            <div>
                <label class="text-[10px] font-black text-slate-500 uppercase">Başlangıç Tarihi</label>
                <input id="startDate" type="date" class="mt-1 w-full px-3 py-2 rounded-lg border border-slate-300 outline-none focus:border-slate-900 text-sm">
            </div>
            <div>
                <label class="text-[10px] font-black text-slate-500 uppercase">Bitiş Tarihi</label>
                <input id="endDate" type="date" class="mt-1 w-full px-3 py-2 rounded-lg border border-slate-300 outline-none focus:border-slate-900 text-sm">
            </div>
            <div>
                <label class="text-[10px] font-black text-slate-500 uppercase">Kullanıcı</label>
                <input id="actor" type="text" placeholder="Ad veya TC" class="mt-1 w-full px-3 py-2 rounded-lg border border-slate-300 outline-none focus:border-slate-900 text-sm">
            </div>
            <div>
                <label class="text-[10px] font-black text-slate-500 uppercase">İşlem Tipi</label>
                <select id="islemTipi" class="mt-1 w-full px-3 py-2 rounded-lg border border-slate-300 outline-none focus:border-slate-900 text-sm">
                    <option value="">Tümü</option>
                    <option value="ARAC_KAYDI_GUNCELLEME">Araç Kaydı Güncelleme</option>
                    <option value="ARAC_KAYDI_SILME">Araç Kaydı Silme</option>
                    <option value="YETKISIZ_ARAC_KAYDI_GUNCELLEME_DENEMESI">Yetkisiz Güncelleme Denemesi</option>
                    <option value="YETKISIZ_ARAC_KAYDI_SILME_DENEMESI">Yetkisiz Silme Denemesi</option>
                </select>
            </div>
            <div>
                <label class="text-[10px] font-black text-slate-500 uppercase">Seviye</label>
                <select id="seviye" class="mt-1 w-full px-3 py-2 rounded-lg border border-slate-300 outline-none focus:border-slate-900 text-sm">
                    <option value="">Tümü</option>
                    <option value="root">Sistem Üst Yetkili</option>
                    <option value="mudur">Müdür</option>
                    <option value="yetkili">Yetkili</option>
                    <option value="personel">Personel</option>
                </select>
            </div>
            <div class="flex gap-2">
                <button onclick="currentPage=1; logYukle(true)" class="w-full bg-slate-900 text-white px-4 py-2 rounded-lg text-[11px] font-black uppercase tracking-widest hover:bg-black transition">Filtrele</button>
                <button onclick="filtreTemizle()" class="bg-white border border-slate-300 text-slate-700 px-4 py-2 rounded-lg text-[11px] font-black uppercase tracking-widest hover:bg-slate-100 transition">Temizle</button>
            </div>
        </div>
    </section>

    <div class="bg-white rounded-xl shadow-[0_0_20px_rgba(0,0,0,0.05)] border border-slate-100 overflow-hidden">
        <table class="w-full text-left">
            <thead class="bg-slate-50 border-b border-slate-200 text-slate-400 text-[10px] uppercase font-black tracking-widest">
                <tr>
                    <th class="px-4 py-4">Tarih - Saat</th>
                    <th class="px-4 py-4">İşlem</th>
                    <th class="px-4 py-4">Kullanıcı</th>
                    <th class="px-4 py-4">Seviye</th>
                    <th class="px-4 py-4">Hedef</th>
                    <th class="px-4 py-4">Açıklama</th>
                </tr>
            </thead>
            <tbody id="logTablo" class="divide-y divide-slate-100 text-sm text-slate-700"></tbody>
        </table>
    </div>

    <div class="mt-4 flex items-center justify-between gap-3">
        <p id="sayfaBilgi" class="text-xs font-bold text-slate-500">Sayfa: 1 / 1 • Toplam: 0</p>
        <div class="flex items-center gap-2">
            <button id="oncekiBtn" onclick="sayfaDegistir(-1)" class="px-4 py-2 rounded-lg border border-slate-300 text-xs font-black uppercase tracking-widest text-slate-700 hover:bg-slate-100 transition">Önceki</button>
            <button id="sonrakiBtn" onclick="sayfaDegistir(1)" class="px-4 py-2 rounded-lg border border-slate-300 text-xs font-black uppercase tracking-widest text-slate-700 hover:bg-slate-100 transition">Sonraki</button>
        </div>
    </div>

    <script>
        let currentPage = 1;
        const pageSize = 50;
        let totalPages = 1;
        let totalItems = 0;

        function getCurrentUser() {
            try {
                const raw = localStorage.getItem('kullanici');
                return raw ? JSON.parse(raw) : null;
            } catch (e) {
                return null;
            }
        }

        function getCurrentTier() {
            const user = getCurrentUser();
            if (!user) return 'personel';
            if (user.rol === 'Süper Admin') return 'root';
            const tier = (user.perm?.yonetimSeviyesi || 'personel').toString().toLowerCase();
            return ['root', 'mudur', 'yetkili', 'personel'].includes(tier) ? tier : 'personel';
        }

        function yetkiKontrol() {
            const user = getCurrentUser();
            if (!user) {
                window.location.href = 'index.html';
                return false;
            }

            const tier = getCurrentTier();
            if (!['root', 'mudur'].includes(tier)) {
                document.body.innerHTML = '<div class="min-h-screen flex items-center justify-center"><p class="text-red-600 font-black text-lg">Burayı Kullanmak İçin Yetkiniz Yoktur!</p></div>';
                return false;
            }
            return true;
        }

        function etiketIslem(islem) {
            return (islem || '').replaceAll('_', ' ');
        }

        function etiketSeviye(s) {
            if (s === 'root') return 'Sistem Üst Yetkili';
            if (s === 'mudur') return 'Müdür';
            if (s === 'yetkili') return 'Yetkili';
            return 'Personel';
        }

        function etiketHedef(tablo, id, hedefAdi) {
            const key = (tablo || '').toString().toLowerCase();
            let ad = tablo || '-';

            if (key === 'tbl_arac_kayitlari') ad = 'Araç Kayıtları';
            else if (key === 'tbl_araclar') ad = 'Araçlar';
            else if (key === 'tbl_personeller') ad = 'Personeller';
            else if (key === 'tbl_istasyonlar') ad = 'İstasyonlar';
            else if (key === 'tbl_islem_loglari') ad = 'İşlem Logları';

            if (hedefAdi) return hedefAdi;
            return id ? `${ad} #${id}` : ad;
        }

        function formatDateTimeTR(value) {
            if (!value) return '-';
            const d = new Date(value);
            if (Number.isNaN(d.getTime())) return '-';
            const tarih = d.toLocaleDateString('tr-TR');
            const saat = d.toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
            return `${tarih} ${saat}`;
        }

        function filtreQuery() {
            const p = new URLSearchParams();
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const actor = document.getElementById('actor').value.trim();
            const islemTipi = document.getElementById('islemTipi').value;
            const seviye = document.getElementById('seviye').value;

            if (startDate) p.set('startDate', startDate);
            if (endDate) p.set('endDate', endDate);
            if (actor) p.set('actor', actor);
            if (islemTipi) p.set('islem_tipi', islemTipi);
            if (seviye) p.set('actor_seviye', seviye);
            p.set('page', String(currentPage));
            p.set('pageSize', String(pageSize));
            return p.toString();
        }

        function sayfaKontrolleriGuncelle() {
            const bilgi = document.getElementById('sayfaBilgi');
            const onceki = document.getElementById('oncekiBtn');
            const sonraki = document.getElementById('sonrakiBtn');

            if (bilgi) bilgi.innerText = `Sayfa: ${currentPage} / ${totalPages} • Toplam: ${totalItems}`;
            if (onceki) onceki.disabled = currentPage <= 1;
            if (sonraki) sonraki.disabled = currentPage >= totalPages;

            if (onceki) onceki.classList.toggle('opacity-50', currentPage <= 1);
            if (sonraki) sonraki.classList.toggle('opacity-50', currentPage >= totalPages);
        }

        function sayfaDegistir(delta) {
            const yeniSayfa = currentPage + delta;
            if (yeniSayfa < 1 || yeniSayfa > totalPages) return;
            currentPage = yeniSayfa;
            logYukle(true);
        }

        async function logYukle(force = false) {
            const btn = document.getElementById('yenileBtn');
            const oldText = btn.innerText;
            btn.disabled = true;
            btn.innerText = 'Yükleniyor...';

            const tbody = document.getElementById('logTablo');
            tbody.innerHTML = '<tr><td colspan="6" class="px-4 py-6 text-slate-400 text-xs">Yükleniyor...</td></tr>';

            try {
                const q = filtreQuery();
                const cacheBuster = force ? `&t=${Date.now()}` : '';
                const res = await fetch(`http://localhost:3000/api/lojistik/islem-loglari?${q}${cacheBuster}`, { cache: 'no-store' });
                const data = await res.json();
                if (!res.ok) throw new Error();

                const rows = data.items || [];
                const pagination = data.pagination || {};
                currentPage = Number(pagination.page || currentPage || 1);
                totalPages = Number(pagination.totalPages || 1);
                totalItems = Number(pagination.total || rows.length || 0);
                sayfaKontrolleriGuncelle();

                if (!rows.length) {
                    tbody.innerHTML = '<tr><td colspan="6" class="px-4 py-6 text-slate-400 text-xs">Kayıt bulunamadı.</td></tr>';
                    return;
                }

                tbody.innerHTML = '';
                rows.forEach(r => {
                    const tarih = formatDateTimeTR(r.created_at);
                    const actor = [r.actor_ad_soyad, r.actor_tc_no].filter(Boolean).join(' | ') || '-';
                    const hedef = etiketHedef(r.hedef_tablo, r.hedef_id, r.hedef_adi);
                    tbody.innerHTML += `
                        <tr>
                            <td class="px-4 py-3 text-xs text-slate-500 font-bold">${tarih}</td>
                            <td class="px-4 py-3 text-xs font-black text-slate-700">${etiketIslem(r.islem_tipi)}</td>
                            <td class="px-4 py-3 text-xs font-semibold">${actor}</td>
                            <td class="px-4 py-3 text-xs font-semibold">${etiketSeviye(r.actor_seviye)}</td>
                            <td class="px-4 py-3 text-xs font-semibold">${hedef}</td>
                            <td class="px-4 py-3 text-xs">${r.aciklama || '-'}</td>
                        </tr>`;
                });
            } catch (e) {
                tbody.innerHTML = '<tr><td colspan="6" class="px-4 py-6 text-red-500 text-xs">Log kayıtları alınamadı.</td></tr>';
            } finally {
                btn.disabled = false;
                btn.innerText = oldText;
                sayfaKontrolleriGuncelle();
            }
        }

        function filtreTemizle() {
            document.getElementById('startDate').value = '';
            document.getElementById('endDate').value = '';
            document.getElementById('actor').value = '';
            document.getElementById('islemTipi').value = '';
            document.getElementById('seviye').value = '';
            currentPage = 1;
            logYukle(true);
        }

        if (yetkiKontrol()) {
            logYukle(true);
        }
    </script>
</body>
</html>
