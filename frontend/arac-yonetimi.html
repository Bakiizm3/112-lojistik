<!DOCTYPE html>
<html lang="tr">
<head>
<script src="config.js"></script>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Sora', sans-serif;
            background:
                radial-gradient(circle at 12% 8%, rgba(14, 165, 233, 0.16), transparent 36%),
                radial-gradient(circle at 88% 10%, rgba(239, 68, 68, 0.16), transparent 34%),
                linear-gradient(135deg, #f8fafc 0%, #eef2ff 100%);
        }

        .panel-card {
            background: rgba(255, 255, 255, 0.90);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(148, 163, 184, 0.22);
            box-shadow: 0 18px 50px rgba(15, 23, 42, 0.10);
            border-radius: 28px;
        }

        .form-chip {
            border: 1px solid #dbe3ef;
            background: #ffffff;
            transition: all .22s ease;
            box-shadow: 0 2px 8px rgba(15, 23, 42, 0.04);
        }

        .form-chip:focus {
            border-color: #0f172a;
            box-shadow: 0 0 0 4px rgba(15, 23, 42, 0.10);
        }

        .thead-dark {
            background: linear-gradient(90deg, #020617 0%, #1e293b 55%, #0f172a 100%);
        }

        .table-row {
            transition: transform .18s ease, box-shadow .18s ease, background-color .18s ease;
        }

        .table-row:hover {
            background: #f8fafc;
            transform: translateY(-1px);
        }

        .edit-mode {
            border-color: rgba(14, 116, 144, 0.45) !important;
            box-shadow: 0 20px 50px rgba(14, 116, 144, 0.12);
        }

        .action-link {
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: .08em;
            padding: 7px 10px;
            border-radius: 999px;
            border: 1px solid transparent;
            transition: all .18s ease;
        }

        .action-link.edit {
            color: #1d4ed8;
            background: #eff6ff;
            border-color: #bfdbfe;
        }

        .action-link.delete {
            color: #b91c1c;
            background: #fef2f2;
            border-color: #fecaca;
        }

        .action-link:hover {
            transform: translateY(-1px);
            filter: brightness(.98);
        }
    </style>
</head>
<body class="p-6 lg:p-10 font-sans text-slate-800 min-h-screen">
    <div class="max-w-[1600px] mx-auto space-y-6">
        <section class="panel-card p-6 lg:p-7">
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 items-center">
                <div class="lg:col-span-7">
                    <div class="border-l-4 border-red-600 pl-4 py-1">
                        <h2 class="text-3xl lg:text-4xl font-black text-slate-900 uppercase tracking-tight">Araç Kayıt ve Yönetim</h2>
                        <p class="text-xs font-bold text-slate-500 uppercase tracking-widest mt-1">ARAÇ YÖNETİM PANELİ</p>
                    </div>
                </div>
                <div class="lg:col-span-5 flex flex-col gap-3 lg:items-end">
                    <div class="relative w-full lg:max-w-md">
                        <input type="text" id="aramaKutusu" onkeyup="tabloFiltrele()" placeholder="Plaka, Model Yılı veya İstasyon Ara..."
                            class="w-full p-4 pl-11 rounded-2xl border border-slate-300 outline-none focus:border-slate-900 text-sm bg-white/95 shadow-sm">
                        <span class="absolute left-4 top-4 text-slate-400">ğ���</span>
                    </div>
                    <p id="aracSayaci" class="text-[11px] font-black text-slate-500 tracking-wide">Görünen: 0 / Toplam: 0</p>
                </div>
            </div>
        </section>

        <section id="formAlani" class="panel-card p-6 lg:p-7">
            <div class="flex flex-wrap items-center justify-between gap-3 mb-6">
                <h3 id="formBaslik" class="text-[11px] font-black text-slate-500 uppercase tracking-[0.18em]">Yeni Araç Tanımla</h3>
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">* Zorunlu Alan</span>
            </div>

            <input type="hidden" id="editId">
            <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-7 gap-4 items-end">
                <div class="flex flex-col">
                    <label class="text-[10px] font-bold text-slate-500 mb-2 uppercase ml-2">Plaka *</label>
                    <input type="text" id="plaka" placeholder="Zorunlu Alan" class="form-chip p-4 rounded-2xl font-black uppercase outline-none">
                </div>

                <div class="flex flex-col">
                    <label class="text-[10px] font-bold text-slate-500 mb-2 uppercase ml-2">Araç Tipi *</label>
                    <select id="arac_tipi" class="form-chip p-4 rounded-2xl font-bold text-slate-600 outline-none">
                        <option value="Ambulans">Ambulans</option>
                        <option value="Hizmet Aracı">Hizmet Aracı</option>
                        <option value="UMKE Aracı">UMKE Aracı</option>
                    </select>
                </div>

                <div class="flex flex-col">
                    <label class="text-[10px] font-bold text-slate-500 mb-2 uppercase ml-2">Model Yılı *</label>
                    <input type="number" id="model_yili" min="1900" max="2100" placeholder="Zorunlu Alan" class="form-chip p-4 rounded-2xl font-black outline-none">
                </div>

                <div class="flex flex-col">
                    <label class="text-[10px] font-bold text-slate-500 mb-2 uppercase ml-2">Muayene Tarihi *</label>
                    <input type="date" id="muayene_tarihi" class="form-chip p-4 rounded-2xl font-bold text-slate-600 outline-none">
                </div>

                <div class="flex flex-col">
                    <label class="text-[10px] font-bold text-slate-500 mb-2 uppercase ml-2">İstasyon (Opsiyonel)</label>
                    <select id="istasyon" class="form-chip p-4 rounded-2xl font-bold text-slate-600 outline-none">
                        <option value="">-- İstasyon Seçilmedi --</option>
                    </select>
                </div>

                <div class="flex flex-col">
                    <label class="text-[10px] font-bold text-slate-500 mb-2 uppercase ml-2">Kilometre (Opsiyonel)</label>
                    <input type="number" id="km" placeholder="Opsiyonel" class="form-chip p-4 rounded-2xl font-black outline-none">
                </div>

                <div class="flex gap-2">
                    <button id="islemButon" onclick="kaydet()" class="w-full bg-slate-900 text-white px-6 py-4 rounded-2xl font-black shadow-lg hover:bg-black transition uppercase text-[10px] tracking-widest">KAYDET</button>
                    <button id="iptalButon" onclick="formSifirla()" class="hidden bg-white text-slate-700 px-4 py-4 rounded-2xl font-bold transition border border-slate-300 hover:bg-slate-100">✖</button>
                </div>
            </div>
        </section>

        <section class="panel-card overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left" id="anaTablo">
                    <thead class="thead-dark text-white text-[10px] font-black uppercase tracking-widest">
                        <tr>
                            <th class="px-8 py-5">Tip</th>
                            <th class="px-8 py-5">Plaka</th>
                            <th onclick="siralaTikla('model_yili')" class="px-8 py-5 cursor-pointer select-none">Model Yılı <span id="sort_model_yili" class="text-slate-300">↕</span></th>
                            <th onclick="siralaTikla('muayene_tarihi')" class="px-8 py-5 cursor-pointer select-none">Muayene Tarihi <span id="sort_muayene_tarihi" class="text-slate-300">↕</span></th>
                            <th onclick="siralaTikla('istasyon_adi')" class="px-8 py-5 cursor-pointer select-none">İstasyon <span id="sort_istasyon_adi" class="text-slate-300">↕</span></th>
                            <th onclick="siralaTikla('kilometre')" class="px-8 py-5 cursor-pointer select-none">KM <span id="sort_kilometre" class="text-slate-300">↕</span></th>
                            <th class="px-8 py-5 text-right">Yönetim</th>
                        </tr>
                    </thead>
                    <tbody id="liste" class="divide-y divide-slate-100 font-bold text-slate-700 bg-white/90"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        let tumAraclar = [];
        let sortState = { alan: null, yon: null };

        function getCurrentUser() {
            try {
                const raw = localStorage.getItem('kullanici');
                return raw ? JSON.parse(raw) : null;
            } catch (e) {
                return null;
            }
        }

        function getCurrentTier() {
            const user = getCurrentUser();
            if (!user) return 'personel';
            if (user.rol === 'Süper Admin') return 'root';
            const tier = (user.perm?.yonetimSeviyesi || 'personel').toString().toLowerCase();
            return ['root', 'mudur', 'yetkili', 'personel'].includes(tier) ? tier : 'personel';
        }

        function getActorPayload() {
            const user = getCurrentUser() || {};
            return {
                ad_soyad: user.ad_soyad || null,
                tc_no: user.tc_no || null,
                seviye: getCurrentTier()
            };
        }

        function formatDateTR(value) {
            if (!value) return 'Belirtilmedi';
            const d = new Date(value);
            if (Number.isNaN(d.getTime())) return 'Belirtilmedi';
            return d.toLocaleDateString('tr-TR');
        }

        async function yukle() {
            const iRes = await fetch('/api/lojistik/istasyonlar');
            const istasyonlar = await iRes.json();
            const sortedIstasyonlar = [...istasyonlar].sort((a, b) => String(a.istasyon_adi || '').localeCompare(String(b.istasyon_adi || ''), 'tr'));
            document.getElementById('istasyon').innerHTML = '<option value="">-- İstasyon Seçilmedi --</option>' + 
                sortedIstasyonlar.map(i => `<option value="${i.istasyon_adi}">${i.istasyon_adi}</option>`).join('');

            const aRes = await fetch('/api/lojistik/araclar');
            tumAraclar = await aRes.json();
            tabloCiz(tumAraclar);
        }

        function tabloCiz(liste) {
            const cizilecekListe = siralaListe(liste);
            const tablo = document.getElementById('liste');
            tablo.innerHTML = '';
            cizilecekListe.forEach(a => {
                tablo.innerHTML += `
                    <tr class="table-row">
                        <td class="px-8 py-5 text-[10px] text-slate-400 uppercase">${(a.arac_tipi || 'Belirtilmedi').toString().toUpperCase()}</td>
                        <td class="px-8 py-5 text-lg tracking-tighter uppercase">${(a.plaka || 'Belirtilmedi').toString().toUpperCase()}</td>
                        <td class="px-8 py-5 text-sm text-slate-500">${a.model_yili || 'Belirtilmedi'}</td>
                        <td class="px-8 py-5 text-sm text-slate-500">${formatDateTR(a.muayene_tarihi)}</td>
                        <td class="px-8 py-5 text-sm text-slate-500">${a.istasyon_adi || 'Belirtilmedi'}</td>
                        <td class="px-8 py-5 text-sm text-slate-500">${a.kilometre === null || a.kilometre === undefined || a.kilometre === '' ? 'Belirtilmedi' : a.kilometre}</td>
                        <td class="px-8 py-5 text-right space-x-4">
                            <button onclick='duzenleHazirla(${JSON.stringify(a)})' class="action-link edit">Düzenle</button>
                            <button onclick="sil(${a.id})" class="action-link delete">Kaldır</button>
                        </td>
                    </tr>`;
            });

            guncelleSayac(cizilecekListe.length, tumAraclar.length);
            guncelleSortRozeti();
        }

        function siralaTikla(alan) {
            const ilkYon = (alan === 'model_yili' || alan === 'kilometre') ? 'desc' : 'asc';
            if (sortState.alan !== alan) {
                sortState = { alan, yon: ilkYon };
            } else {
                sortState.yon = sortState.yon === 'asc' ? 'desc' : 'asc';
            }
            tabloFiltrele();
        }

        function siralaListe(liste) {
            if (!sortState.alan || !sortState.yon) return [...liste];

            const carpan = sortState.yon === 'asc' ? 1 : -1;
            return [...liste].sort((a, b) => {
                if (sortState.alan === 'model_yili') {
                    return ((Number(a.model_yili) || 0) - (Number(b.model_yili) || 0)) * carpan;
                }
                if (sortState.alan === 'kilometre') {
                    const akm = a.kilometre === null || a.kilometre === undefined || a.kilometre === '' ? -1 : Number(a.kilometre);
                    const bkm = b.kilometre === null || b.kilometre === undefined || b.kilometre === '' ? -1 : Number(b.kilometre);
                    return (akm - bkm) * carpan;
                }
                if (sortState.alan === 'muayene_tarihi') {
                    const at = a.muayene_tarihi ? new Date(a.muayene_tarihi).getTime() : Number.MAX_SAFE_INTEGER;
                    const bt = b.muayene_tarihi ? new Date(b.muayene_tarihi).getTime() : Number.MAX_SAFE_INTEGER;
                    return (at - bt) * carpan;
                }
                if (sortState.alan === 'istasyon_adi') {
                    const ai = String(a.istasyon_adi || '').toLocaleUpperCase('tr');
                    const bi = String(b.istasyon_adi || '').toLocaleUpperCase('tr');
                    return ai.localeCompare(bi, 'tr') * carpan;
                }
                return 0;
            });
        }

        function guncelleSortRozeti() {
            const hedefler = ['model_yili', 'muayene_tarihi', 'istasyon_adi', 'kilometre'];
            hedefler.forEach((key) => {
                const el = document.getElementById(`sort_${key}`);
                if (!el) return;
                if (sortState.alan === key) {
                    el.innerText = sortState.yon === 'asc' ? '↑' : '↓';
                    el.className = 'text-white';
                } else {
                    el.innerText = '↕';
                    el.className = 'text-slate-300';
                }
            });
        }

        function sadeceHarfler(metin) {
            return (metin || '').toString().toLocaleLowerCase('tr').replace(/[^a-zA-ZçğıöşüÇ�İÖ�Ü]/g, '');
        }

        function guncelleSayac(gorunen, toplam) {
            document.getElementById('aracSayaci').innerText = `Görünen: ${gorunen} / Toplam: ${toplam}`;
        }

        async function kaydet() {
            const id = document.getElementById('editId').value;
            const plaka = document.getElementById('plaka').value.trim().toUpperCase();
            const arac_tipi = document.getElementById('arac_tipi').value;
            const model_yili = document.getElementById('model_yili').value;
            const muayene_tarihi = document.getElementById('muayene_tarihi').value;
            const istasyon_adi = document.getElementById('istasyon').value;
            const kilometre = document.getElementById('km').value;

            if (!plaka || !arac_tipi || !model_yili || !muayene_tarihi) {
                alert("Lütfen yıldızlı alanları doldurun! (Plaka, Araç Tipi, Model Yılı, Muayene Tarihi)");
                return;
            }

            const veri = {
                id: id || null,
                plaka: plaka,
                arac_tipi: arac_tipi,
                model_yili: Number(model_yili),
                muayene_tarihi: muayene_tarihi,
                istasyon_adi: istasyon_adi || null,
                kilometre: kilometre === '' ? null : Number(kilometre),
                actor: getActorPayload()
            };

            try {
                const res = await fetch('/api/lojistik/arac-kaydet', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(veri)
                });

                const data = await res.json();

                if (res.ok) {
                    alert(data.mesaj);
                    formSifirla();
                    yukle(); // Listeyi tazele
                } else {
                    alert("Hata: " + data.mesaj);
                }
            } catch (err) {
                alert("Sunucuya bağlanılamadı!");
            }
        }

        function duzenleHazirla(arac) {
            document.getElementById('formBaslik').innerText = "Aracı Düzenle: " + arac.plaka;
            document.getElementById('formAlani').classList.add('edit-mode');
            document.getElementById('editId').value = arac.id;
            document.getElementById('plaka').value = (arac.plaka || '').toString().toUpperCase();
            document.getElementById('arac_tipi').value = arac.arac_tipi;
            document.getElementById('model_yili').value = arac.model_yili || '';
            document.getElementById('muayene_tarihi').value = arac.muayene_tarihi ? String(arac.muayene_tarihi).slice(0, 10) : '';
            document.getElementById('istasyon').value = arac.istasyon_adi || "";
            document.getElementById('km').value = arac.kilometre ?? '';
            document.getElementById('islemButon').innerText = "GÜNCELLEMEYİ KAYDET";
            document.getElementById('iptalButon').classList.remove('hidden');
        }

        function formSifirla() {
            document.getElementById('formBaslik').innerText = "Yeni Araç Tanımla";
            document.getElementById('formAlani').classList.remove('edit-mode');
            document.getElementById('editId').value = "";
            document.getElementById('plaka').value = "";
            document.getElementById('model_yili').value = "";
            document.getElementById('muayene_tarihi').value = "";
            document.getElementById('km').value = "";
            document.getElementById('islemButon').innerText = "KAYDET";
            document.getElementById('iptalButon').classList.add('hidden');
        }

        async function sil(id) {
            if(confirm("Sistemden kaldırılsın mı?")) {
                const res = await fetch(`/api/lojistik/arac-sil/${id}`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ actor: getActorPayload() })
                });

                if(res.ok) {
                    yukle(); // Listeyi yenile
                } else {
                    alert("Silme işlemi başarısız oldu.");
                }
            }
        }

        function tabloFiltrele() {
            const kelime = document.getElementById('aramaKutusu').value.toLocaleLowerCase('tr').trim();
            const harfFiltre = sadeceHarfler(kelime);

            const filtreli = tumAraclar.filter(a => 
                (a.plaka && a.plaka.toLocaleLowerCase('tr').includes(kelime)) ||
                (harfFiltre && sadeceHarfler(a.plaka).includes(harfFiltre)) ||
                (a.istasyon_adi && a.istasyon_adi.toLocaleLowerCase('tr').includes(kelime)) ||
                (a.model_yili && String(a.model_yili).includes(kelime))
            );
            tabloCiz(filtreli);
        }

        document.getElementById('plaka').addEventListener('input', (e) => {
            e.target.value = e.target.value.toUpperCase();
        });

        yukle();
    </script>
</body>
</html>
